# ============================================================
# BarberTurno - Configuración de la aplicación Spring Boot
# ============================================================

# ── Servidor ─────────────────────────────────────────────────
server.port=8080
spring.application.name=barberturno

# ── Base de datos MySQL ───────────────────────────────────────
# URL de conexión a la base de datos MySQL local
spring.datasource.url=jdbc:mysql://localhost:3306/barberturno_db?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true

# Credenciales de acceso a la base de datos
spring.datasource.username=root
spring.datasource.password=root

# Driver JDBC para MySQL 8+
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
# Estrategia DDL: update crea/actualiza tablas automáticamente
spring.jpa.hibernate.ddl-auto=update

# Dialecto SQL específico para MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Mostrar las sentencias SQL en consola (útil en desarrollo)
spring.jpa.show-sql=true

# Formatear el SQL mostrado en consola
spring.jpa.properties.hibernate.format_sql=true

# ── Zona horaria ──────────────────────────────────────────────
spring.jackson.time-zone=America/Bogota
spring.jackson.serialization.write-dates-as-timestamps=false

# ── Logs ──────────────────────────────────────────────────────
logging.level.com.barberturno=DEBUG
logging.level.org.springframework.web=INFO
